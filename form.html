<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
</head>
<body>
    <header>
        <h1>Student Registration form</h1>
    </header>
    
    <form action="">
        <label for = "Full Name">Full Name</label>
        <br>
        <input type="text" placeholder="Enter your Name" >

        <br><br>

        <label>Email:</label>
        <br>
        <input type="email" placeholder="Enter your email">

        <br><br>
        <label>Password</label>
        <br>
        <input type="password" >

        <br><br>
        <label>Gender</label>
        <br>
        <label for ="Male"><input type="radio" name="Gender" id="Male">Male</label>
        <label for ="Female"><input type="radio" name="Gender" id="Female">Female</label>
        
        <br><br>
        <label>Skills:</label>
        <br>

        <label><input type="checkbox">HTML</label>
        <label><input type="checkbox">CSS</label>
        <label><input type="checkbox">JavaScript</label>

        <br><br>
        <label>Date of Birth:</label><br>
        <input type="date">
        <br><br>
        <button>Register</button>
        
        <hr>
        
        <h2>Submitted Students (Dummy Date)</h2>

        <table border="2">
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Gender</th>
                <th>Skills</th>
                <th>DOB</th>
            </tr>

            <tr>
                <td>Alice</td>
                <td>alice@gmail.com</td>
                <td>Female</td>
                <td>HTML,CSS</td>
                <td>2002-05-10</td>
            </tr>

            <tr>
                <td>Bob</td>
                <td>bob@gmail.com</td>
                <td>Male</td>
                <td>JavaScript</td>
                <td>2001-11-22</td>
            </tr>

        </table>




    </form>
</body>
</html>
